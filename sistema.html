<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalPro Taller</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4 font-sans">
    <div class="max-w-md mx-auto bg-slate-800 p-6 rounded-xl border-t-4 border-yellow-500 shadow-2xl">
        <h2 class="text-2xl font-black text-center text-yellow-500 mb-6 uppercase tracking-tighter">Global Pro Automotriz</h2>
        
        <input type="text" id="placa" placeholder="PLACA" class="w-full p-3 mb-3 bg-slate-700 rounded-lg border border-slate-600 focus:border-yellow-500 outline-none uppercase">
        <input type="text" id="nombre" placeholder="Nombre del Cliente" class="w-full p-3 mb-3 bg-slate-700 rounded-lg outline-none">
        <input type="text" id="tecnico" placeholder="Técnico Encargado" class="w-full p-3 mb-3 bg-slate-700 rounded-lg outline-none">
        <input type="number" id="km" placeholder="Kilometraje" class="w-full p-3 mb-3 bg-slate-700 rounded-lg outline-none">
        <input type="text" id="aceite" placeholder="Tipo de Aceite" class="w-full p-3 mb-3 bg-slate-700 rounded-lg outline-none">
        <textarea id="notas" placeholder="Observaciones del servicio..." class="w-full p-3 mb-4 bg-slate-700 rounded-lg h-24 outline-none"></textarea>

        <!-- CAMPOS NUEVOS PARA EL SISTEMA DE APROBACIÓN -->
        <div class="grid grid-cols-2 gap-3 mb-4">
            <input type="number" id="monto" placeholder="Monto ($)" class="w-full p-3 bg-slate-700 rounded-lg outline-none border border-green-500/50">
            <input type="text" id="whatsapp" placeholder="WhatsApp (ej: 569...)" class="w-full p-3 bg-slate-700 rounded-lg outline-none border border-green-500/50">
        </div>

        <!-- BOTÓN ANTIGUO (Guardado directo sin aprobación) -->
        <button onclick="guardarRapido()" class="w-full bg-slate-600 text-white font-bold py-3 rounded-xl hover:bg-slate-500 transition mb-3 text-sm">
            💾 GUARDAR RÁPIDO (Sin Aprobación)
        </button>

        <!-- BOTÓN NUEVO (Flujo de Firma) -->
        <button onclick="solicitarAprobacion()" id="btnAprobar" class="w-full bg-green-600 text-white font-black py-4 rounded-xl hover:bg-green-500 active:scale-95 transition shadow-lg shadow-green-900/50">
            📱 ENVIAR PARA FIRMA Y APROBACIÓN
        </button>
        
        <div class="mt-8 pt-6 border-t border-slate-700">
            <h3 class="text-sm text-slate-400 mb-2">CONSULTAR ESTADO</h3>
            <div class="flex gap-2">
                <input type="text" id="busqueda" placeholder="Buscar Placa" class="flex-1 p-3 bg-slate-700 rounded-lg border border-slate-600 outline-none uppercase">
                <button onclick="buscarEstado()" class="bg-slate-600 px-4 rounded-lg">🔍</button>
            </div>
            <div id="resultado" class="mt-4 space-y-3"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://taller.estilosgrado33.workers.dev";

        // --- FUNCIÓN ANTIGUA (Guarda directo como OT si es necesario) ---
        async function guardarRapido() {
            // Esta función guarda el 'Eventos' directamente como lo tenías antes
            // Lógica de tu código original...
            const btn = event.target;
            const data = {
                placa: document.getElementById('placa').value,
                nombre_usuario: document.getElementById('nombre').value,
                tecnico: document.getElementById('tecnico').value,
                km: document.getElementById('km').value,
                aceite: document.getElementById('aceite').value,
                notas: document.getElementById('notas').value,
                tipo: 'OT'
            };

            if(!data.placa) return alert("La placa es obligatoria");
            btn.disabled = true; btn.innerText = "PROCESANDO...";

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(res.ok) { alert("✅ Guardado rápido"); location.reload(); } 
                else { throw new Error(); }
            } catch(e) { alert("❌ Error"); } 
            finally { btn.disabled = false; btn.innerText = "💾 GUARDAR RÁPIDO"; }
        }

        // --- NUEVA FUNCIÓN: Solicitar Aprobación ---
        async function solicitarAprobacion() {
            const btn = document.getElementById('btnAprobar');
            const data = {
                placa: document.getElementById('placa').value.toUpperCase(),
                nombre: document.getElementById('nombre').value, // Solo para referencia
                tecnico: document.getElementById('tecnico').value,
                km: document.getElementById('km').value,
                detalles: document.getElementById('notas').value, // Usamos notas como detalles
                monto: document.getElementById('monto').value,
                whatsapp: document.getElementById('whatsapp').value
            };

            if(!data.placa || !data.monto || !data.whatsapp) return alert("❌ Faltan datos: Placa, Monto y WhatsApp son obligatorios para este método.");

            btn.disabled = true; btn.innerText = "GENERANDO ENLACE...";

            try {
                // Llamamos al nuevo endpoint para crear la cotización
                const res = await fetch(`${API_URL}?accion=crear_cotizacion`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();

                if(res.ok && result.token) {
                    // 1. Construir el link de aprobación con firma
                    const urlAprobacion = `https://taller.estilosgrado33.workers.dev/aprobar?token=${result.token}`;
                    
                    // 2. Mensaje personalizado
                    const mensaje = `Hola ${data.nombre || 'Cliente'}, su vehículo placa ${data.placa} tiene un presupuesto de $${data.monto}. Por favor revise y FIRME la autorización aquí: ${urlAprobacion}`;
                    
                    // 3. Abrir WhatsApp
                    const waLink = `https://wa.me/${data.whatsapp}?text=${encodeURIComponent(mensaje)}`;
                    window.open(waLink, '_blank');
                    
                    alert("✅ Se abrió WhatsApp. Espera la firma del cliente para generar la orden.");
                } else {
                    alert("Error al generar la solicitud: " + (result.error || "Desconocido"));
                }
            } catch(e) { 
                console.error(e);
                alert("❌ Error de conexión con el servidor"); 
            } finally { 
                btn.disabled = false; btn.innerText = "📱 ENVIAR PARA FIRMA Y APROBACIÓN"; 
            }
        }

        // --- BUSCAR ESTADO (Modificado para ver si firmó) ---
        async function buscarEstado() {
            const q = document.getElementById('busqueda').value;
            const res = await fetch(`${API_URL}?placa=${q}&tipo=estado_aprobacion`);
            const data = await res.json();
            const cont = document.getElementById('resultado');
            
            if(!data || data.length === 0) {
                cont.innerHTML = "<p class='text-center text-slate-500'>Sin resultados</p>";
                return;
            }

            cont.innerHTML = data.map(ev => `
                <div class="bg-slate-900 p-4 rounded-lg border-l-4 ${ev.estado === 'Aprobado' ? 'border-green-500' : 'border-yellow-500'} text-sm shadow-md">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-bold ${ev.estado === 'Aprobado' ? 'text-green-400' : 'text-yellow-500'}">
                                ${ev.estado.toUpperCase()} ${ev.estado === 'Aprobado' ? '✅' : '⏳'}
                            </p>
                            <p class="text-white mt-1">Monto: $${ev.monto}</p>
                            <p class="text-slate-400 text-xs">${ev.detalles}</p>
                        </div>
                        ${ev.firma_imagen ? `<img src="${ev.firma_imagen}" class="h-10 bg-white rounded">` : ''}
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
