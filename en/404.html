/* Language Switcher Styles */
#lang-switcher a, #lang-switcher span {

#lang-switcher a::after {

  top: 50%;
  left: 50%;
  width: 0;
  height: 0;

  background: rgba(255,255,255,0.2);

<script>
// Language detection: redirect to English version if browser is in English
(function() {
  if (sessionStorage.getItem('lang_choice')) return;
  var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (lang.startsWith('en') && !window.location.pathname.startsWith('/en/')) {
    var enPath = '/en' + window.location.pathname;
    // Check if user hasn't manually chosen Spanish
    if (!document.referrer.includes(window.location.hostname) || !document.referrer.includes('/en/')) {
      // Set a flag and suggest redirect
      sessionStorage.setItem('lang_suggested', 'en');
    }
  }
  sessionStorage.setItem('lang_choice', 'es');
})();
</script>
