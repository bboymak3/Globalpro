<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalPro Taller</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4 font-sans">
    <div class="max-w-lg mx-auto bg-slate-800 p-6 rounded-xl border-t-4 border-yellow-500 shadow-2xl">
        <h2 class="text-2xl font-black text-center text-yellow-500 mb-6 uppercase tracking-tighter">Global Pro Automotriz</h2>
        
        <input type="text" id="placa" placeholder="PLACA" class="w-full p-3 mb-3 bg-slate-700 rounded-lg border border-slate-600 focus:border-yellow-500 outline-none uppercase font-bold tracking-widest">
        <input type="text" id="nombre" placeholder="Nombre del Cliente" class="w-full p-3 mb-3 bg-slate-700 rounded-lg outline-none">
        <input type="text" id="tecnico" placeholder="Técnico Encargado" class="w-full p-3 mb-3 bg-slate-700 rounded-lg outline-none">
        <input type="number" id="km" placeholder="Kilometraje" class="w-full p-3 mb-3 bg-slate-700 rounded-lg outline-none">
        <input type="text" id="aceite" placeholder="Tipo de Aceite" class="w-full p-3 mb-3 bg-slate-700 rounded-lg outline-none">
        <textarea id="notas" placeholder="Detalles del trabajo..." class="w-full p-3 mb-4 bg-slate-700 rounded-lg h-24 outline-none"></textarea>

        <hr class="border-slate-700 my-4">

        <div class="grid grid-cols-1 gap-3 mb-4">
            <div>
                <label class="text-xs text-slate-400 ml-1">Monto Total ($)</label>
                <input type="number" id="monto" placeholder="0" class="w-full p-3 bg-slate-700 rounded-lg outline-none border border-green-500/50 text-green-400 font-bold text-lg">
            </div>
            
            <!-- CHECKBOX Y CAMPOS DE PAGO -->
            <div class="flex items-center gap-3 bg-slate-900/50 p-3 rounded-lg border border-slate-600 cursor-pointer" onclick="togglePaymentFields()">
                <input type="checkbox" id="checkPago" class="w-5 h-5 text-green-500 rounded bg-slate-700 border-slate-500">
                <label for="checkPago" class="text-sm text-slate-300 select-none">
                    El cliente abonó
                </label>
            </div>

            <div id="paymentFields" class="hidden space-y-3 bg-slate-900/30 p-3 rounded-lg border border-slate-700">
                <div>
                    <label class="text-xs text-slate-400 ml-1">Monto del Abono ($)</label>
                    <input type="number" id="montoAbono" placeholder="0" class="w-full p-2 bg-slate-700 rounded border border-slate-600 outline-none">
                </div>
                <div>
                    <label class="text-xs text-slate-400 ml-1">Medio de Pago</label>
                    <select id="metodoPago" class="w-full p-2 bg-slate-700 rounded border border-slate-600 outline-none">
                        <option value="Efectivo">Efectivo</option>
                        <option value="Transferencia">Transferencia</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-xs text-slate-400 ml-1">WhatsApp del Cliente</label>
                <div class="flex">
                    <select id="codPais" class="bg-slate-600 text-white p-3 rounded-l-lg outline-none border-r border-slate-700 text-sm">
                        <option value="58" selected>🇻🇪 +58</option>
                        <option value="56">🇨🇱 +56</option>
                        <option value="54">🇦🇷 +54</option>
                        <option value="57">🇨🇴 +57</option>
                    </select>
                    <input type="number" id="whatsapp" placeholder="414..." class="flex-1 p-3 bg-slate-700 rounded-r-lg outline-none border border-green-500/50">
                </div>
            </div>
        </div>

        <button onclick="guardarRapido()" class="w-full bg-slate-600 text-white font-bold py-3 rounded-xl hover:bg-slate-500 transition mb-3 text-sm">
            💾 GUARDAR RÁPIDO
        </button>

        <button onclick="solicitarAprobacion()" id="btnAprobar" class="w-full bg-green-600 text-white font-black py-4 rounded-xl hover:bg-green-500 active:scale-95 transition shadow-lg shadow-green-900/50 flex items-center justify-center gap-2 mb-6">
            <span>📱</span> ENVIAR COTIZACIÓN Y FIRMAR
        </button>
        
        <hr class="border-slate-700 mb-4">
        <h3 class="text-sm font-bold text-slate-300 mb-3 text-center uppercase">Consulta</h3>
        
        <div class="mb-4 bg-slate-900/50 p-3 rounded-lg border border-slate-700">
            <label class="text-xs text-blue-400 font-bold mb-1 block">HISTORIAL</label>
            <div class="flex gap-2">
                <input type="text" id="busquedaHistorial" placeholder="Buscar..." class="flex-1 p-2 bg-slate-700 rounded border border-slate-600 outline-none text-sm">
                <button onclick="buscarHistorial()" class="bg-blue-600 px-3 rounded-lg hover:bg-blue-500">🔍</button>
            </div>
            <div id="resultadoHistorial" class="mt-2 space-y-2 text-xs"></div>
        </div>

        <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
            <label class="text-xs text-green-400 font-bold mb-1 block">APROBACIONES Y FIRMAS</label>
            <div class="flex gap-2">
                <input type="text" id="busquedaCotizacion" onkeypress="handleEnter(event)" placeholder="Placa" class="flex-1 p-2 bg-slate-700 rounded border border-slate-600 outline-none text-sm uppercase text-center">
                <button onclick="buscarCotizacion()" class="bg-green-600 px-3 rounded-lg hover:bg-green-500">🔍</button>
            </div>
            <div id="resultadoCotizacion" class="mt-2 space-y-3"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://taller.estilosgrado33.workers.dev";

        function togglePaymentFields() {
            const check = document.getElementById('checkPago');
            const fields = document.getElementById('paymentFields');
            if (check.checked) { fields.classList.remove('hidden'); } 
            else { fields.classList.add('hidden'); }
        }

        async function guardarRapido() {
            const btn = event.target;
            const data = {
                placa: document.getElementById('placa').value.toUpperCase(),
                nombre_usuario: document.getElementById('nombre').value,
                tecnico: document.getElementById('tecnico').value,
                km: document.getElementById('km').value,
                aceite: document.getElementById('aceite').value,
                notas: document.getElementById('notas').value,
                tipo: 'OT'
            };
            if(!data.placa) return alert("Falta la Placa");
            btn.disabled = true; btn.innerText = "GUARDANDO...";
            try {
                const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if(res.ok) alert("✅ Guardado"); else throw new Error("Error");
            } catch(e) { alert("❌ Error"); } finally { btn.disabled = false; btn.innerText = "💾 GUARDAR RÁPIDO"; }
        }

        async function solicitarAprobacion() {
            const btn = document.getElementById('btnAprobar');
            const placa = document.getElementById('placa').value.toUpperCase();
            const nombre = document.getElementById('nombre').value;
            const tecnico = document.getElementById('tecnico').value;
            const km = document.getElementById('km').value;
            const detalles = document.getElementById('notas').value;
            const monto = document.getElementById('monto').value;
            const codPais = document.getElementById('codPais').value;
            let numero = document.getElementById('whatsapp').value.replace(/\D/g,'');

            let pago_adelanto = 'No', monto_abono = 0, metodo_pago = 'No';
            if (document.getElementById('checkPago').checked) {
                pago_adelanto = 'Si';
                monto_abono = document.getElementById('montoAbono').value || 0;
                metodo_pago = document.getElementById('metodoPago').value;
            }

            if(!placa || !monto || !numero) return alert("Faltan datos obligatorios");
            
            const whatsappCompleto = `${codPais}${numero}`;
            btn.disabled = true; btn.innerText = "GENERANDO...";

            try {
                const payload = { placa, tecnico, km, detalles, monto, whatsapp: whatsappCompleto, pago_adelanto, monto_abono, metodo_pago };
                const res = await fetch(`${API_URL}?accion=crear_cotizacion`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const result = await res.json();
                if (res.ok && result.success && result.token) {
                    const urlAprobacion = `https://taller.estilosgrado33.workers.dev/aprobar?token=${result.token}`;
                    const mensaje = `Hola ${nombre}, tu vehículo ${placa} tiene un presupuesto de $${monto}.\n\nFirme aquí: ${urlAprobacion}`;
                    window.open(`https://wa.me/${whatsappCompleto}?text=${encodeURIComponent(mensaje)}`, '_blank');
                    alert("✅ Abre WhatsApp para enviar.");
                } else {
                    alert("⚠️ Error: " + (result.error || "Respuesta inesperada"));
                }
            } catch(e) { alert("❌ Error: " + e.message); } finally { btn.disabled = false; btn.innerText = "📱 ENVIAR COTIZACIÓN Y FIRMAR"; }
        }

        async function buscarHistorial() {
            const q = document.getElementById('busquedaHistorial').value.trim();
            const cont = document.getElementById('resultadoHistorial');
            if(!q) return;
            try {
                const res = await fetch(`${API_URL}?buscar=${q}`);
                const data = await res.json();
                cont.innerHTML = data.length ? data.map(ev => `<div class="bg-slate-800 p-2 rounded border-l-2 border-blue-500"><p class="text-blue-400 text-[10px] font-bold">${new Date(ev.fecha_hora).toLocaleDateString()}</p><p class="text-slate-300">KM: ${ev.kilometraje}</p></div>`).join('') : "<p class='text-center text-slate-500'>Sin resultados</p>";
            } catch(e) { cont.innerHTML = "Error"; }
        }

        function handleEnter(e) { if (e.key === 'Enter') buscarCotizacion(); }

               async function buscarCotizacion() {
            let q = document.getElementById('busquedaCotizacion').value.trim();
            q = q.toUpperCase();
            const cont = document.getElementById('resultadoCotizacion');
            if(!q) return alert("Escribe una placa");
            cont.innerHTML = "<p class='text-center text-green-400 text-xs animate-pulse'>Buscando...</p>";
            try {
                const res = await fetch(`${API_URL}?placa=${q}&tipo=estado_aprobacion`);
                const data = await res.json();
                if(!data || data.length === 0) {
                    cont.innerHTML = `<div class="text-center p-4 bg-slate-800 rounded border border-slate-600"><p class="text-slate-400">No hay datos para <strong class="text-white">${q}</strong></p></div>`;
                    return;
                }
                cont.innerHTML = data.map(ev => `
                    <div class="bg-slate-800 rounded-2xl overflow-hidden border-2 ${ev.estado === 'Aprobado' ? 'border-green-500 shadow-green-900/30' : 'border-yellow-500'} shadow-lg">
                        <div class="bg-slate-700 p-4 flex justify-between items-center border-b border-slate-600">
                            <span class="text-white font-black text-2xl tracking-wide">${ev.placa}</span>
                            <span class="px-4 py-2 rounded-full text-sm font-bold ${ev.estado === 'Aprobado' ? 'bg-green-600 text-white' : 'bg-yellow-600 text-white'}">${ev.estado.toUpperCase()}</span>
                        </div>
                        <div class="p-6">
                            <!-- TOTAL GRANDE -->
                            <div class="flex justify-between items-end mb-4">
                                <span class="text-slate-400 text-xl">Total</span>
                                <span class="text-5xl font-black text-green-400">$${ev.monto}</span>
                            </div>
                            
                            <!-- ABONO GRANDE -->
                            ${ev.monto_abono > 0 ? `
                            <div class="bg-green-900/30 p-4 rounded-2xl mb-4 border border-green-500/30">
                                <div class="flex justify-between items-center text-lg mb-1">
                                    <span class="text-green-400 font-bold uppercase">Abono Recibido</span>
                                    <span class="bg-green-600 text-white px-3 py-1 rounded text-sm font-bold">${ev.metodo_pago}</span>
                                </div>
                                <div class="flex justify-between text-xl">
                                    <span class="text-green-300 font-bold">$${ev.monto_abono}</span>
                                    <span class="text-slate-400">Saldo: $${ev.monto - ev.monto_abono}</span>
                                </div>
                            </div>` : ''}

                            <div class="text-lg text-slate-300 mt-4 leading-relaxed border-t border-slate-700 pt-4">${ev.detalles}</div>
                            
                            <!-- FIRMA GIGANTE (H-24 en lugar de H-8) -->
                            <div class="mt-6 flex justify-between items-end bg-slate-900/50 p-4 rounded-xl border border-slate-600">
                                <div class="flex-1 text-right">
                                    <span class="text-xs text-slate-500 block mb-1">Firma Digital</span>
                                    <!-- AQUI ESTA EL CAMBIO: h-24 en lugar de h-8 -->
                                    ${ev.firma_imagen ? `<img src="${ev.firma_imagen}" class="h-24 bg-white rounded shadow-lg border-2 border-white object-contain">` : '<span class="text-slate-600 text-xs">Sin firma</span>'}
                                </div>
                            </div>
                            
                            <div class="mt-4 flex justify-between items-center">
                                <span class="text-slate-500 text-base font-mono">${new Date(ev.fecha_creacion).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); cont.innerHTML = "<p class='text-center text-red-500'>Error al buscar</p>"; }
        }
    </script>
</body>
</html>
