<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalPro Taller</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4 font-sans">
    <div class="max-w-md mx-auto bg-slate-800 p-6 rounded-xl border-t-4 border-yellow-500 shadow-2xl">
        <h2 class="text-2xl font-black text-center text-yellow-500 mb-6 uppercase tracking-tighter">Global Pro Automotriz</h2>
        
        <!-- CAMPOS COMUNES -->
        <input type="text" id="placa" placeholder="PLACA" class="w-full p-3 mb-3 bg-slate-700 rounded-lg border border-slate-600 focus:border-yellow-500 outline-none uppercase">
        <input type="text" id="nombre" placeholder="Nombre del Cliente" class="w-full p-3 mb-3 bg-slate-700 rounded-lg outline-none">
        <input type="text" id="tecnico" placeholder="Técnico Encargado" class="w-full p-3 mb-3 bg-slate-700 rounded-lg outline-none">
        <input type="number" id="km" placeholder="Kilometraje" class="w-full p-3 mb-3 bg-slate-700 rounded-lg outline-none">
        <input type="text" id="aceite" placeholder="Tipo de Aceite" class="w-full p-3 mb-3 bg-slate-700 rounded-lg outline-none">
        <textarea id="notas" placeholder="Detalles del trabajo / Diagnóstico..." class="w-full p-3 mb-4 bg-slate-700 rounded-lg h-24 outline-none"></textarea>

        <hr class="border-slate-700 my-4">

        <!-- CAMPOS ESPECÍFICOS PARA APROBACIÓN -->
        <div class="grid grid-cols-1 gap-3 mb-4">
            <div>
                <label class="text-xs text-slate-400 ml-1">Monto Total a Cobrar ($)</label>
                <input type="number" id="monto" placeholder="0" class="w-full p-3 bg-slate-700 rounded-lg outline-none border border-green-500/50 text-green-400 font-bold">
            </div>
            <div>
                <label class="text-xs text-slate-400 ml-1">WhatsApp del Cliente (Solo números)</label>
                <div class="flex">
                    <select id="codPais" class="bg-slate-600 text-white p-3 rounded-l-lg outline-none border-r border-slate-700 text-sm">
                        <option value="58" selected>🇻🇪 +58 (Venezuela)</option>
                        <option value="56">🇨🇱 +56 (Chile)</option>
                        <option value="54">🇦🇷 +54 (Argentina)</option>
                        <option value="57">🇨🇴 +57 (Colombia)</option>
                        <option value="52">🇲🇽 +52 (México)</option>
                        <option value="34">🇪🇸 +34 (España)</option>
                        <option value="51">🇵🇪 +51 (Perú)</option>
                        <option value="593">🇪🇨 +593 (Ecuador)</option>
                        <option value="1">🇺🇸 +1 (USA)</option>
                        <option value="55">🇧🇷 +55 (Brasil)</option>
                        <option value="507">🇵🇦 +507 (Panamá)</option>
                        <option value="506">🇨🇷 +506 (Costa Rica)</option>
                    </select>
                    <input type="number" id="whatsapp" placeholder="414 123 4567" class="flex-1 p-3 bg-slate-700 rounded-r-lg outline-none border border-green-500/50 placeholder-slate-500">
                </div>
            </div>
        </div>

        <!-- BOTONES DE ACCIÓN -->
        <button onclick="guardarRapido()" class="w-full bg-slate-600 text-white font-bold py-3 rounded-xl hover:bg-slate-500 transition mb-3 text-sm">
            💾 GUARDAR RÁPIDO (Historial)
        </button>

        <button onclick="solicitarAprobacion()" id="btnAprobar" class="w-full bg-green-600 text-white font-black py-4 rounded-xl hover:bg-green-500 active:scale-95 transition shadow-lg shadow-green-900/50 flex items-center justify-center gap-2 mb-6">
            <span>📱</span> ENVIAR COTIZACIÓN Y FIRMAR
        </button>
        
        <hr class="border-slate-700 mb-4">

        <!-- ZONA DE BÚSQUEDA DUAL -->
        <h3 class="text-sm font-bold text-slate-300 mb-3 text-center uppercase">Consulta de Registros</h3>
        
        <!-- Buscador 1: Historial (Antiguo) -->
        <div class="mb-4 bg-slate-900/50 p-3 rounded-lg border border-slate-700">
            <label class="text-xs text-blue-400 font-bold mb-1 block">HISTORIAL DE SERVICIOS</label>
            <div class="flex gap-2">
                <input type="text" id="busquedaHistorial" placeholder="Buscar placa o teléfono..." class="flex-1 p-2 bg-slate-700 rounded border border-slate-600 outline-none text-sm">
                <button onclick="buscarHistorial()" class="bg-blue-600 px-3 rounded-lg hover:bg-blue-500">🔍</button>
            </div>
            <div id="resultadoHistorial" class="mt-2 space-y-2 text-xs"></div>
        </div>

        <!-- Buscador 2: Cotizaciones (Nuevo) -->
        <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
            <label class="text-xs text-green-400 font-bold mb-1 block">ESTADO DE APROBACIÓN Y FIRMAS</label>
            <div class="flex gap-2">
                <input type="text" id="busquedaCotizacion" onkeypress="handleEnter(event)" placeholder="Buscar Placa (Ej: RCM36F)" class="flex-1 p-2 bg-slate-700 rounded border border-slate-600 outline-none text-sm uppercase text-center">
                <button onclick="buscarCotizacion()" class="bg-green-600 px-3 rounded-lg hover:bg-green-500">🔍</button>
            </div>
            <div id="resultadoCotizacion" class="mt-2 space-y-2 text-xs"></div>
        </div>

    </div>

    <script>
        const API_URL = "https://taller.estilosgrado33.workers.dev";

        // --- 1. GUARDAR RÁPIDO (Historial) ---
        async function guardarRapido() {
            const btn = event.target;
            const data = {
                placa: document.getElementById('placa').value.toUpperCase(),
                nombre_usuario: document.getElementById('nombre').value,
                tecnico: document.getElementById('tecnico').value,
                km: document.getElementById('km').value,
                aceite: document.getElementById('aceite').value,
                notas: document.getElementById('notas').value,
                tipo: 'OT'
            };

            if(!data.placa) return alert("La placa es obligatoria");
            btn.disabled = true; btn.innerText = "GUARDANDO...";

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(res.ok) { 
                    alert("✅ Guardado en historial"); 
                    // Opcional: limpiar campos
                    // document.getElementById('placa').value = '';
                } else { 
                    throw new Error("Error en servidor"); 
                }
            } catch(e) { 
                alert("❌ No se pudo guardar."); 
            } finally { 
                btn.disabled = false; 
                btn.innerText = "💾 GUARDAR RÁPIDO (Historial)"; 
            }
        }

        // --- 2. SOLICITAR APROBACIÓN ---
        async function solicitarAprobacion() {
            const btn = document.getElementById('btnAprobar');
            const placa = document.getElementById('placa').value.toUpperCase();
            const nombre = document.getElementById('nombre').value;
            const tecnico = document.getElementById('tecnico').value;
            const km = document.getElementById('km').value;
            const detalles = document.getElementById('notas').value;
            const monto = document.getElementById('monto').value;
            const codPais = document.getElementById('codPais').value;
            let numero = document.getElementById('whatsapp').value.replace(/\D/g,''); 

            if(!placa) return alert("Falta la Placa");
            if(!monto) return alert("Falta el Monto estimado");
            if(!numero) return alert("Falta el número de WhatsApp");
            if(numero.length < 8) return alert("El número de WhatsApp parece muy corto");

            const whatsappCompleto = `${codPais}${numero}`;
            btn.disabled = true; 
            btn.innerText = "GENERANDO ENLACE...";

            try {
                const payload = { placa, tecnico, km, detalles, monto, whatsapp: whatsappCompleto };

                const res = await fetch(`${API_URL}?accion=crear_cotizacion`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await res.json();

                if (res.ok && result.success && result.token) {
                    const urlAprobacion = `https://taller.estilosgrado33.workers.dev/aprobar?token=${result.token}`;
                    const mensaje = `Hola ${nombre}, tu vehículo ${placa} tiene un presupuesto de $${monto}.\n\nFirme la autorización aquí: ${urlAprobacion}`;
                    window.open(`https://wa.me/${whatsappCompleto}?text=${encodeURIComponent(mensaje)}`, '_blank');
                    alert("✅ Revisa WhatsApp para enviar.");
                } else {
                    alert("⚠️ Error: " + (result.error || "Respuesta inesperada"));
                }
            } catch(e) { 
                alert("❌ Error: " + e.message); 
            } finally { 
                btn.disabled = false; 
                btn.innerText = "📱 ENVIAR COTIZACIÓN Y FIRMAR"; 
            }
        }

        // --- 3. BUSCAR HISTORIAL (Antiguo) ---
        async function buscarHistorial() {
            const q = document.getElementById('busquedaHistorial').value.trim();
            const cont = document.getElementById('resultadoHistorial');
            if(!q) return;

            try {
                const res = await fetch(`${API_URL}?buscar=${q}`);
                const data = await res.json();
                
                cont.innerHTML = data.length ? data.map(ev => `
                    <div class="bg-slate-800 p-2 rounded border-l-2 border-blue-500">
                        <p class="text-blue-400 text-[10px] font-bold">${new Date(ev.fecha_hora).toLocaleDateString()}</p>
                        <p class="text-slate-300">KM: ${ev.kilometraje} | Aceite: ${ev.tipo_aceite}</p>
                        <p class="text-slate-500 italic">${ev.notas_exigibles}</p>
                    </div>
                `).join('') : "<p class='text-center text-slate-500'>Sin resultados</p>";
            } catch(e) { cont.innerHTML = "Error"; }
        }

        // --- 4. BUSCAR COTIZACIÓN (Nuevo) ---
        function handleEnter(e) { if (e.key === 'Enter') buscarCotizacion(); }

        async function buscarCotizacion() {
            const q = document.getElementById('busquedaCotizacion').value.trim();
            const cont = document.getElementById('resultadoCotizacion');
            if(!q) return alert("Escribe una placa");

            cont.innerHTML = "<p class='text-center text-green-400 text-[10px]'>Buscando aprobaciones...</p>";

            try {
                // Aseguramos mayúsculas para la búsqueda
                const res = await fetch(`${API_URL}?placa=${q}&tipo=estado_aprobacion`);
                const data = await res.json();

                if(!data || data.length === 0) {
                    cont.innerHTML = `<p class='text-center text-slate-500'>No hay cotizaciones para <strong>${q}</strong></p>`;
                    return;
                }

                cont.innerHTML = data.map(ev => `
                    <div class="bg-slate-800 p-2 rounded border-l-2 ${ev.estado === 'Aprobado' ? 'border-green-500' : 'border-yellow-500'}">
                        <div class="flex justify-between">
                            <span class="font-bold ${ev.estado === 'Aprobado' ? 'text-green-400' : 'text-yellow-500'} text-xs">
                                ${ev.estado.toUpperCase()}
                            </span>
                            ${ev.firma_imagen ? `<img src="${ev.firma_imagen}" class="h-8 bg-white rounded">` : ''}
                        </div>
                        <p class="text-white font-bold">$${ev.monto}</p>
                        <p class="text-slate-400">${ev.detalles}</p>
                    </div>
                `).join('');
            } catch(e) {
                console.error(e);
                cont.innerHTML = "Error al buscar";
            }
        }
    </script>
</body>
</html>
